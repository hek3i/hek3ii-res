  <!-- Scripts -->
  <script src="data/keyflame_db.js"></script>
  <script src="vanta.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Guide list groups categorizer
      const groups = {
        core: ["beginners-guide", "guides_plugin-starter-guide", "guides_preset-organization", "guides_render-settings"],
        win: ["extract-win", "install-win", "unlicensed-win", "guides_genp-adobe-activation", "guides_plugin-install-locations"],
        mac: ["extract-mac", "install-mac", "unlicensed-mac", "guides_macked-adobe-activation", "guides_rosetta-m1-guide", "guides_gatekeeper-quarantine-fixes"],
        workflow: ["guides_maxon-red-giant-fixes", "guides_maxon-serial-filler-method", "guides_sourcing-anime-footage", "guides_changing-after-effects-version", "guides_after-effects-installation-paths", "guides_topaz-export-workflow", "guides_missing-effects-fix"]
      };

      // Load sidebars
      function buildSidebars() {
        if (!window.keyflameDb || !window.keyflameDb.guides) return;
        const guides = window.keyflameDb.guides;
        const guideMap = {};
        guides.forEach(g => { guideMap[g.slug] = g; });

        // Helper to render link
        const renderLink = (slug) => {
          const g = guideMap[slug];
          if (!g) return '';
          return `<a href="?guide=${slug}" class="doc-sidebar-link" data-slug="${slug}">${g.title}</a>`;
        };

        document.getElementById("sidebar-core").innerHTML = groups.core.map(renderLink).join("");
        document.getElementById("sidebar-win").innerHTML = groups.win.map(renderLink).join("");
        document.getElementById("sidebar-mac").innerHTML = groups.mac.map(renderLink).join("");
        document.getElementById("sidebar-workflow").innerHTML = groups.workflow.map(renderLink).join("");
      }

      // Render Active Guide Content
      function renderActiveGuide() {
        if (!window.keyflameDb || !window.keyflameDb.guides) return;
        const guides = window.keyflameDb.guides;

        // Get slug from query parameter
        const urlParams = new URLSearchParams(window.location.search);
        let slug = urlParams.get("guide");
        
        // Default to beginners-guide if empty or invalid
        if (!slug || !guides.some(g => g.slug === slug)) {
          slug = "beginners-guide";
        }

        const guide = guides.find(g => g.slug === slug);
        if (!guide) return;

        // Highlight sidebar links
        document.querySelectorAll(".doc-sidebar-link").forEach(link => {
          if (link.getAttribute("data-slug") === slug) {
            link.classList.add("active");
          } else {
            link.classList.remove("active");
          }
        });

        // Set content html
        const contentContainer = document.getElementById("active-guide-content");
        
        // Clean titles and formats
        let badgeType = "ae";
        if (slug.includes("win")) badgeType = "windows";
        if (slug.includes("mac")) badgeType = "macos";

        const sectionsHtml = guide.sections.map(sec => `
          <div id="${sec.id}" class="doc-section">
            ${sec.kicker ? `<span class="section-kicker">${sec.kicker}</span>` : ''}
            <h2>${sec.heading}</h2>
            <div>${sec.htmlContent}</div>
          </div>
        `).join("");

        contentContainer.innerHTML = `
          <header class="page-header">
            <h1>${guide.title}</h1>
            <p>${guide.description}</p>
            <span class="badge-tag ${badgeType}">${guide.title.includes("Mac") || guide.title.includes("macOS") ? 'macOS Guide' : (guide.title.includes("Windows") ? 'Windows Guide' : 'After Effects')}</span>
          </header>
          ${sectionsHtml}
        `;

        // Load right outline TOC
        const tocContainer = document.getElementById("active-guide-toc");
        tocContainer.innerHTML = guide.sections.map(sec => `
          <a href="#${sec.id}" class="doc-outline-link">${sec.heading}</a>
        `).join("");

        // Highlight right TOC link behavior
        document.querySelectorAll(".doc-outline-link").forEach(link => {
          link.addEventListener("click", () => {
            document.querySelectorAll(".doc-outline-link").forEach(l => l.style.color = "");
            link.style.color = "var(--mint)";
          });
        });

        // Hook code block copy button again for dynamic content
        initCodeCopy();

        // Scroll to hash section if present in URL
        if (window.location.hash) {
          const target = document.querySelector(window.location.hash);
          if (target) {
            setTimeout(() => {
              target.scrollIntoView({ behavior: 'smooth' });
            }, 100);
          }
        }
      }

      // Initialize
      buildSidebars();
      renderActiveGuide();

      // Listen to navigation popstate (if parameters change)
      window.addEventListener("popstate", renderActiveGuide);
    });
  </script>
</body>
